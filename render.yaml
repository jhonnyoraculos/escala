services:
  - type: web
    name: jr-escala-web
    runtime: python
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn web.app:app
    envVars:
      - key: JR_ESCALA_DB_PATH
        value: /var/data/jr_escala.db
      - key: JR_ESCALA_UPLOAD_DIR
        value: /var/data/uploads
      - key: JR_ESCALA_REPORTS_DIR
        value: /var/data/reports
    disk:
      name: jr-escala-data
      mountPath: /var/data
      sizeGB: 1
