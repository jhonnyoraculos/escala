services:
  - type: web
    name: jr-escala-web
    runtime: python
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn --workers 1 web.app:app
    envVars:
      - key: PYTHON_VERSION
        value: 3.11.11
      - key: JR_ESCALA_FORCE_SQLITE
        value: "1"
      - key: JR_ESCALA_DB_PATH
        value: /var/data/jr_escala.db
      - key: JR_ESCALA_UPLOAD_DIR
        value: /var/data/uploads
      - key: JR_ESCALA_REPORTS_DIR
        value: /var/data/reports
      - key: JR_ESCALA_ENABLE_PG_POOL
        value: "0"
    disk:
      name: jr-escala-data
      mountPath: /var/data
      sizeGB: 1
